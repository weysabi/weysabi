# Tool Calling — Design v1
#
# Status: Draft
# Target: v0.6.0

schema:
  user_provides:
    - key: Zod schema
      convert: internal zodToJsonSchema() — handles object/string/number/boolean/array
    - key: raw JSON Schema
      pass_through: as-is Record<string, unknown>
  how: tools[].parameters is always JSON Schema internally

types:
  ToolDefinition:
    name: string
    description: string
    parameters: Record<string, unknown>  # JSON Schema
  ToolCall:
    id: string
    name: string
    arguments: string  # JSON string
  CompleteRequest additions:
    tools: ToolDefinition[] | undefined
    toolChoice: '"auto" | "required" | "none"' | undefined
    maxToolCalls: number | undefined  # default 10
  StreamRequest:
    tools: rejected with SabiError("Tools not supported in streaming mode")

handler_interface:
  buildBody:
    params.tools: ToolDefInfo[]  # { name, description, parameters (JSON Schema) }
    params.toolChoice: string | undefined
  parseResponse:
    returns: ProviderCallResult & { tool_calls?: ToolCall[] }

provider_format:
  openai:
    request:
      tools: [{ function: { name, description, parameters } }]
      tool_choice: '"auto" | "required" | "none"'
    response:
      tool_calls in choice.message
    result type:
      role: tool
      tool_call_id: string
      content: string
  anthropic:
    request:
      tools: [{ name, description, input_schema }]
    response:
      content[] block type: tool_use
    result type:
      role: user
      content: [{ type: tool_result, tool_use_id, content }]
  google:
    request:
      tools: [{ functionDeclarations: [{ name, description, parameters }] }]
    response:
      parts[] functionCall
    result type:
      role: function
      parts: [{ functionResponse: { name, response } }]

core_loop:
  in: SabiImpl.complete()
  steps:
    - send request with tools + messages
    - if response has tool_calls:
        a. append assistant message with tool_calls to messages
        b. for each tool_call:
            - find matching tool by name
            - execute tool with parsed arguments
            - append tool result message
        c. increment toolCallCount
        d. if toolCallCount < maxToolCalls, goto step 1 (same model, no failover)
        e. else throw MaxToolCallsExceededError
    - if response has no tool_calls:
        return CompleteResponse with content
  failover:
    - tool loop runs on primary model only
    - if primary model fails during tool loop, normal failover to fallbacks
    - tool execution errors: caught, sent back as tool result with error message

errors:
  ToolExecutionError:
    message: Tool "{name}" failed: {error}
  MaxToolCallsExceededError:
    message: Max tool call iterations ({max}) exceeded

files:
  types.ts:
    - ToolDefinition, ToolCall types
    - CompleteRequest: add tools, toolChoice, maxToolCalls
    - StreamRequest: add tools (for rejection validation)
    - ProviderCallResult: add optional tool_calls
    - Message: extend role with "tool"
  errors.ts:
    - ToolExecutionError
    - MaxToolCallsExceededError
  utils.ts:
    - zodToJsonSchema(schema: z.ZodType): Record<string, unknown>
  handler.ts:
    - buildBody: add tools + toolChoice to params
    - parseResponse: returns tool_calls
  providers.ts:
    - ProviderClient.complete: accept tools + toolChoice, pass to executeRequest
    - executeRequest: pass to handler.buildBody
    - stream: reject tools
  providers/openai.ts:
    - buildBody: add tools array, tool_choice
    - parseResponse: extract tool_calls from choices[0].message
  providers/anthropic.ts:
    - buildBody: add tools array, convert tool calls in messages
    - parseResponse: extract tool_use blocks from content
  providers/google.ts:
    - buildBody: add functionDeclarations, convert functionCall/functionResponse
    - parseResponse: extract functionCall from parts
  index.ts:
    - tool loop in SabiImpl.complete()
    - tools + stream rejection in SabiImpl.stream()
